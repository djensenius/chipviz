name: Release Assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4.2.0
      - name: Install Linux renderer dependencies
        run: sudo apt-get update && sudo apt-get install -y libegl1-mesa-dev libwayland-dev libx11-dev libxkbcommon-dev libxkbcommon-x11-dev pkg-config
      - name: Install Rust lint components
        run: mise exec -- rustup component add rustfmt clippy
      - name: Build release assets
        run: scripts/package-release.sh
      - name: Build GBA ROM asset
        run: |
          sudo apt-get update
          sudo apt-get install -y wget ca-certificates gnupg
          wget https://apt.devkitpro.org/install-devkitpro-pacman
          chmod +x install-devkitpro-pacman
          sudo ./install-devkitpro-pacman -y
          sudo dkp-pacman -S --noconfirm gba-dev
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=/opt/devkitpro/devkitARM
          export PATH="$DEVKITARM/bin:/opt/devkitpro/tools/bin:$PATH"
          make -C cores/gba/homebrew
          cp cores/gba/homebrew/chipviz-gba.gba dist/assets/
      - name: Build N64 ROM asset
        run: |
          docker run --rm \
            -v "$PWD":/workspace \
            -w /workspace/cores/n64/homebrew \
            ghcr.io/libdragon/libdragon:latest \
            make
          cp cores/n64/homebrew/chipviz-n64.z64 dist/assets/
          python3 - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile
          assets = Path("dist/assets")
          zip_path = Path("dist/chipviz-assets.zip")
          if zip_path.exists():
            zip_path.unlink()
          with ZipFile(zip_path, "w", ZIP_DEFLATED) as archive:
            for path in sorted(assets.iterdir()):
              archive.write(path, path.name)
          PY
      - name: Upload individual assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/assets/* --clobber
      - name: Upload combined zip
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/chipviz-assets.zip --clobber
