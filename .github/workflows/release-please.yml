name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Check release-please token
        id: token
        run: |
          if [ -n "${{ secrets.RELEASE_PLEASE_TOKEN }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Release Please is skipped until RELEASE_PLEASE_TOKEN is configured as a fine-grained PAT with contents:write and pull-requests:write."
          fi
      - uses: googleapis/release-please-action@v5
        if: steps.token.outputs.configured == 'true'
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
