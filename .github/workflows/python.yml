name: Python

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    name: Python lint and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4.2.0
      - run: mise exec -- just python-lint
      - run: mise exec -- just python-test
      - run: mise exec -- just host-sample
